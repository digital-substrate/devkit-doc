name: Build and deploy documentation

on:
  push:
    # Pushing a `v*` tag is the canonical deploy trigger — posed
    # manually once dsviper / kibo / doc / website are co-validated.
    # Branch pushes are NOT built in CI: local `make check` is the
    # pre-commit gate, and the tag build itself catches any regression
    # before publishing.
    tags: ["v*"]
  pull_request:
    branches: [main, "LTS-*"]
  # Manual trigger kept as an escape hatch for re-deploying the current
  # state without bumping the tag (e.g. Pages outage retry).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so a future `git describe` can resolve tags
          # if we ever build off a non-tag ref that wants the nearest tag.
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      # Node powers the Node API reference: during `make html`, sphinx-js runs
      # TypeDoc over the @digitalsubstrate/dsviper TypeScript declarations
      # (see source/conf.py + the root package.json).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Install Node dependencies
        run: npm ci
      - name: Derive DOC_VERSION
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "doc_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "doc_version=1.2-dev+${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
      - name: Build HTML
        run: make html
        env:
          DOC_VERSION: ${{ steps.version.outputs.doc_version }}
      # Always: human-downloadable review artifact (PR previews, post-merge inspection)
      - name: Upload review artifact
        uses: actions/upload-artifact@v7
        with:
          name: devkit-doc-html
          path: build/html/
          retention-days: 7
      # Pages artifact only when a deploy is happening (tag push or manual re-deploy)
      - name: Upload Pages artifact
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/html/

  deploy:
    # Deploy on tag push (canonical) or workflow_dispatch (manual re-deploy escape hatch).
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    # Serialise Pages deploys only — branch builds (CI) run unconstrained.
    # GitHub Pages allows a single concurrent deploy; queue rather than cancel.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
