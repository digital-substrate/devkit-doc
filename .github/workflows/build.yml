name: Build and deploy documentation

on:
  push:
    branches: [main, "LTS-*"]
  pull_request:
    branches: [main, "LTS-*"]

# Allow only one concurrent deployment, skip queued, do not cancel in-progress.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build HTML (fail on warnings)
        run: make html SPHINXOPTS="-W --keep-going -n"
      # PRs and non-main branches: keep a human-downloadable artifact
      - name: Upload review artifact
        if: github.event_name == 'pull_request' || github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: devkit-doc-html
          path: build/html/
          retention-days: 7
      # main: upload as a Pages artifact for the deploy job
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html/

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
