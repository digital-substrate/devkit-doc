name: Build and deploy documentation

on:
  push:
    branches: [main, "LTS-*"]
    # Tag push triggers a Pages deploy — matches viper's publish.yml convention.
    # Tag a release (e.g. `v1.2.8`) to publish docs.digitalsubstrate.io. Branch
    # pushes only build (CI gate + downloadable review artifact).
    tags: ["v*"]
  pull_request:
    branches: [main, "LTS-*"]
  # Manual escape hatch — deploy whatever HEAD currently is on the chosen ref.
  # Use for hotfixes (typo, broken link) when bumping a tag would be overkill.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build HTML
        run: make html
      # Always: human-downloadable review artifact (PR previews, post-merge inspection)
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: devkit-doc-html
          path: build/html/
          retention-days: 7
      # Pages artifact only when this run will deploy (tag push or manual dispatch)
      - name: Upload Pages artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html/

  deploy:
    # Deploy on tag push (`v*` — canonical release) or manual dispatch (hotfix escape hatch).
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    # Serialise Pages deploys only — branch builds (CI) run unconstrained.
    # GitHub Pages allows a single concurrent deploy; queue rather than cancel.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
