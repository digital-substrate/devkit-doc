name: Build and deploy documentation

on:
  push:
    branches: [main, "LTS-*"]
  pull_request:
    branches: [main, "LTS-*"]
  # Manual trigger for Pages deployment.
  # Deploy is intentionally gated on a human action — matches the
  # rest of the ecosystem's convention (devkit-website's deploy.py /
  # /deploy-crying-byte for prod). Push to main only builds; deploy
  # is via the GitHub UI "Run workflow" button or `gh workflow run`.
  workflow_dispatch:

# Allow only one concurrent deployment, skip queued, do not cancel in-progress.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build HTML
        run: make html
      # Always: human-downloadable review artifact (PR previews, post-merge inspection)
      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: devkit-doc-html
          path: build/html/
          retention-days: 7
      # Pages artifact only when a deploy is requested manually from main
      - name: Upload Pages artifact
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/html/

  deploy:
    # Deploy only on manual trigger from main — explicit human gate, matches the ecosystem's prod-deploy convention
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
