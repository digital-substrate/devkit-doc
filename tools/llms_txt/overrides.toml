# Per-URL overrides applied by tools/build_llms_txt.py when expanding
# {{auto:...}} markers in tools/llms_txt/template.md.
#
# Defaults: title comes from the first `# Heading` in each .md file;
# description comes from the paragraph immediately following the H1.
# Override here when the page's first paragraph is the wrong shape
# (too long, too narrative) for an llms.txt entry. Keep one-liners
# tight — ≤ 100 chars where possible.
#
# Fields:
#   title        — short label for the bullet text
#   description  — one-liner after the colon
#   sort         — integer order key within an auto block (lower = earlier)
#   skip         — exclude from any auto block
#
# URL keys are the full https://docs.digitalsubstrate.io/.../*.html
# emitted by _url_from_path() — match exactly.

